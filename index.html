<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buni | The Future is Back</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff9800;
            --primary-glow: rgba(255, 152, 0, 0.5);
            --secondary: #ff5722;
            --dark: #080808;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--dark);
            color: #fff;
            /* Changed to allow scrolling if content is too tall for small screens */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .hero {
            position: relative;
            flex: 1; /* Takes up all available space, pushing footer down */
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
            padding: 40px 0;
        }
        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(to bottom, rgba(8, 8, 8, 0.4), rgba(8, 8, 8, 0.67)),
                url('images/buni001.jpeg') no-repeat;
            background-size: cover;
            background-position: center;
            z-index: 0;
            opacity: 0.6;
        }
        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.15;
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 20%, var(--dark) 90%);
            z-index: 2;
            pointer-events: none;
        }

        .glass-card {
            position: relative;
            z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid var(--glass-border);
            padding: clamp(30px, 5vw, 60px) clamp(20px, 4vw, 40px);
            border-radius: 40px;
            text-align: center;
            max-width: 750px;
            width: 90%;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .logo-main {
            height: clamp(60px, 10vw, 90px);
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px var(--primary-glow));
        }

        .headline {
            font-size: clamp(35px, 9vw, 85px);
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 0.9;
            margin-bottom: 15px;
            background: linear-gradient(to right, #fff, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .sub-tag {
            font-size: clamp(10px, 2vw, 13px);
            text-transform: uppercase;
            letter-spacing: clamp(3px, 1vw, 8px);
            color: var(--primary);
            margin-bottom: 30px;
            font-weight: 700;
            opacity: 0.9;
        }

        .cta-phrase {
            font-size: clamp(16px, 3vw, 20px);
            color: #ccc;
            margin-bottom: 20px;
        }

        .cta-phrase b {
            color: #fff;
            border-bottom: 2px solid var(--primary);
        }

        .btn-action {
            padding: 18px clamp(30px, 5vw, 50px);
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #000;
            text-decoration: none;
            font-weight: 800;
            font-size: clamp(14px, 2vw, 18px);
            border-radius: 100px;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 152, 0, 0.4);
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* --- STYLISH RESPONSIVE FOOTER --- */
        .partner-footer {
            position: relative;
            z-index: 20;
            width: 100%;
            padding: 30px 20px;
            background: linear-gradient(to top, rgba(255,255,255,0.05), transparent);
            border-top: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .footer-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--primary);
            opacity: 0.6;
        }

        .partner-tray {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(30px, 10vw, 90px);
            flex-wrap: wrap; /* Logos will wrap instead of shrinking too much */
        }

        .partner-logo {
            height: clamp(50px, 8vw, 80px); /* Responsive size */
            width: auto;
            transition: transform 0.3s ease, filter 0.3s ease;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)) grayscale(0.5);
        }

        .partner-logo:hover {
            transform: scale(1.1) translateY(-5px);
            filter: drop-shadow(0 10px 20px var(--primary-glow)) grayscale(0);
        }

        @media (max-width: 480px) {
            body { overflow-y: auto; } /* Ensure mobile can scroll to footer */
            .partner-footer { padding: 20px; }
            .partner-tray { gap: 30px; }
        }
    </style>
</head>
<body>

<section class="hero">
    <canvas id="matrix-canvas"></canvas>

    <div class="glass-card" id="card">
        <img src="images/buni.jpeg" alt="Buni Logo" class="logo-main">
        
        <h1 class="headline">WE ARE<br>BACK</h1>
        <p class="sub-tag">CO-WORKING SPACE · MENTORSHIP</p>

        <p class="cta-phrase">The next chapter of <b>Tanzanian Innovation</b> starts here.</p>
        <p class="cta-phrase"><b>Register Now</b></p>

        <a href="https://docs.google.com/forms/d/e/1FAIpQLSdDQeKfE3ydjB9X2mhZNe0bZNajM9ilT3EsMh7CbKv4hC2sOw/viewform" class="btn-action">Get Started Now</a>
    </div>
</section>

<footer class="partner-footer">
    <span class="footer-label">In Partnership With</span>
    <div class="partner-tray">
        <img src="images/costech.jpeg" alt="COSTECH" class="partner-logo">
        <img src="images/dtbi.png" alt="DTBi" class="partner-logo">
    </div>
</footer>

<script>
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.onresize = resize;
    resize();

    const letters = "01";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(8, 8, 8, 0.1)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ff9800";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = letters.charAt(Math.floor(Math.random() * letters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 50);

    const card = document.getElementById('card');
    const hero = document.querySelector('.hero');
    hero.addEventListener('mousemove', (e) => {
        const xAxis = (window.innerWidth / 2 - e.pageX) / 30;
        const yAxis = (window.innerHeight / 2 - e.pageY) / 30;
        card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });
    hero.addEventListener('mouseleave', () => {
        card.style.transform = `rotateY(0deg) rotateX(0deg)`;
    });
</script>

</body>
</html>
